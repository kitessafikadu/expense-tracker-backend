openapi: 3.0.3
info:
  title: Personal Expense Tracker API
  description: |
    Personal Expense Tracker backend API.

    **Authentication flow**
    - Get `access_token` and `refresh_token` from `POST /auth/login`
    - Send `Authorization: Bearer <access_token>` to protected endpoints
    - Rotate tokens with `POST /auth/refresh`
    - Revoke the current refresh token with `POST /auth/logout`

    **Response format**
    - All endpoints return the same top-level envelope: `success`, `message`, `data`, `errors`, and `meta`
    - Validation and business errors always use `errors` as an array of strings
    - Paginated list endpoints return `data.items` and `meta.pagination`

    ## Features
    - User authentication and profile management
    - Expense tracking with categories
    - Debt tracking (lent/borrowed)
    - Spending reports and insights
    - Interactive API documentation
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Authentication
    description: User registration, login, token refresh, and logout (public endpoints)
  - name: User
    description: User profile management (JWT required)
  - name: Expenses
    description: Daily expense logging and management (JWT required)
  - name: Categories
    description: Spending categories (JWT required)
  - name: Debts
    description: Track money lent/borrowed between peers (JWT required)
  - name: Reports
    description: Spending insights and summaries (JWT required)
  - name: Documentation
    description: API documentation endpoints

paths:
  # ========================================
  # AUTHENTICATION ENDPOINTS
  # ========================================
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      description: Create a new user account
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
            example:
              name: "John Doe"
              email: "john@university.edu"
              password: "Secure123!"
      responses:
        '201':
          description: User successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: "Registration failed"
                data: null
                errors:
                  - "email already used"
                meta: null

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: Authenticate user and get an access token plus refresh token
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
            example:
              email: "john@university.edu"
              password: "Secure123!"
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: "Authentication failed"
                data: null
                errors:
                  - "invalid credentials"
                meta: null

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh tokens
      description: Exchange a valid refresh token for a new access token and refresh token
      operationId: refreshTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshInput'
            example:
              refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh.signature"
      responses:
        '200':
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Revoke the current refresh token so it can no longer be used to mint new access tokens
      operationId: logoutUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshInput'
            example:
              refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh.signature"
      responses:
        '200':
          description: Logout completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ========================================
  # USER ENDPOINTS
  # ========================================
  /user/profile:
    get:
      tags:
        - User
      summary: Get user profile
      description: Returns the authenticated user's profile information
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/update:
    put:
      tags:
        - User
      summary: Update user profile
      description: Update authenticated user's profile information (partial updates supported)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserInput'
            examples:
              update_name:
                summary: Update only name
                value:
                  name: "John Updated"
              update_style:
                summary: Update budgeting style
                value:
                  budgeting_style: "strict"
              update_all:
                summary: Update multiple fields
                value:
                  name: "John Updated"
                  budgeting_style: "strict"
                  default_currency: "USD"
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ========================================
  # EXPENSE ENDPOINTS (Team 2)
  # ========================================
  /expenses:
    get:
      tags:
        - Expenses
      summary: List expenses
      description: List expenses for the current user. Optional filters by date range and category.
      security:
        - BearerAuth: []
      parameters:
        - name: from_date
          in: query
          description: Start date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: End date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: category_id
          in: query
          description: Filter by category UUID
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: List of expenses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseListResponse'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Expenses
      summary: Create expense
      description: Create a new expense for the current user.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
      responses:
        '201':
          description: Created expense
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseSuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /expenses/{id}:
    get:
      tags:
        - Expenses
      summary: Get expense by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Expense
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseSuccessResponse'
        '400':
          description: Invalid expense ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - Expenses
      summary: Update expense
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpenseRequest'
      responses:
        '200':
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseSuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Expenses
      summary: Delete expense
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ========================================
  # CATEGORY ENDPOINTS (Team 2)
  # ========================================
  /categories:
    get:
      tags:
        - Categories
      summary: List categories
      description: List global and user-defined categories for the authenticated user.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '400':
          description: Invalid pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Categories
      summary: Create category
      description: Create a global or user-defined category.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Created category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategorySuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /categories/{id}:
    get:
      tags:
        - Categories
      summary: Get category by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategorySuccessResponse'
        '400':
          description: Invalid category ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - Categories
      summary: Update category
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Updated category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategorySuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Categories
      summary: Delete category
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ========================================
  # DEBT ENDPOINTS
  # ========================================
  /debts:
    get:
      tags:
        - Debts
      summary: List all debts
      description: Get all debts for the authenticated user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: List of debts retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtListResponse'
        '400':
          description: Invalid pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Debts
      summary: Create a new debt
      description: Add a new debt (lent or borrowed)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDebtInput'
            examples:
              lent_money:
                summary: Money lent to friend
                value:
                  type: "lent"
                  peer_name: "Alex"
                  amount: 100.00
                  due_date: "2024-02-01"
                  reminder_enabled: true
                  note: "Movie tickets"
              borrowed_money:
                summary: Money borrowed from friend
                value:
                  type: "borrowed"
                  peer_name: "Sarah"
                  amount: 50.00
                  due_date: "2024-02-15"
                  reminder_enabled: false
      responses:
        '201':
          description: Debt created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtSuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization

  /debts/upcoming:
    get:
      tags:
        - Debts
      summary: List upcoming debts
      description: Get debts due in the next X days (default 7)
      security:
        - BearerAuth: []
      parameters:
        - name: days
          in: query
          description: Number of days to look ahead
          required: false
          schema:
            type: integer
            default: 7
            minimum: 1
            example: 7
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: List of upcoming debts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtListResponse'
        '400':
          description: Invalid days parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization

  /debts/{id}:
    put:
      tags:
        - Debts
      summary: Update a debt
      description: Update an existing debt (partial updates supported)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDebtInput'
            example:
              amount: 150.00
              note: "Updated amount"
      responses:
        '200':
          description: Debt updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtSuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Debt not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /debts/{id}/pay:
    patch:
      tags:
        - Debts
      summary: Mark debt as paid
      description: Update debt status to 'paid'
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Debt marked as paid successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtSuccessResponse'
        '400':
          description: Bad request (e.g., debt already paid)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Debt not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ========================================
  # REPORT ENDPOINTS
  # ========================================
  /reports/weekly:
    get:
      tags:
        - Reports
      summary: Get weekly spending report
      description: Get expense and debt summary for a date range
      security:
        - BearerAuth: []
      parameters:
        - name: start
          in: query
          description: Start date (YYYY-MM-DD)
          required: true
          schema:
            type: string
            format: date
          example: "2024-01-01"
        - name: end
          in: query
          description: End date (YYYY-MM-DD)
          required: true
          schema:
            type: string
            format: date
          example: "2024-01-07"
      responses:
        '200':
          description: Weekly report generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyReportSuccessResponse'
        '400':
          description: Invalid date range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_params:
                  value:
                    success: false
                    message: "Validation failed"
                    data: null
                    errors:
                      - "start and end are required"
                    meta: null
                invalid_date:
                  value:
                    success: false
                    message: "Validation failed"
                    data: null
                    errors:
                      - "start must use YYYY-MM-DD"
                    meta: null
                invalid_range:
                  value:
                    success: false
                    message: "Validation failed"
                    data: null
                    errors:
                      - "end date must be on or after start date"
                    meta: null
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reports/daily:
    get:
      tags:
        - Reports
      summary: Get daily spending report
      description: Get expense and debt summary for a single date
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          description: Date (YYYY-MM-DD)
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Daily report generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyReportSuccessResponse'
        '400':
          description: Invalid date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reports/monthly:
    get:
      tags:
        - Reports
      summary: Get monthly spending report
      description: Get expense and debt summary for a given month
      security:
        - BearerAuth: []
      parameters:
        - name: month
          in: query
          description: Month (YYYY-MM)
          required: true
          schema:
            type: string
            example: "2024-01"
      responses:
        '200':
          description: Monthly report generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyReportSuccessResponse'
        '400':
          description: Invalid month
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ========================================
  # DOCUMENTATION ENDPOINTS
  # ========================================
  /api-docs:
    get:
      tags:
        - Documentation
      summary: API documentation redirect
      description: Redirects to the Swagger UI interface
      responses:
        '301':
          description: Redirecting to /api-docs/

  /api-docs/:
    get:
      tags:
        - Documentation
      summary: Swagger UI
      description: Interactive API documentation interface
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string

  /api-docs/openapi.yaml:
    get:
      tags:
        - Documentation
      summary: OpenAPI specification
      description: Raw OpenAPI YAML file
      responses:
        '200':
          description: OpenAPI specification
          content:
            application/yaml:
              schema:
                type: string

components:
  parameters:
    Page:
      name: page
      in: query
      description: Page number, starting from 1
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSize:
      name: page_size
      in: query
      description: Number of items per page
      required: false
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter your JWT token in the format "Bearer &lt;token&gt;"

  schemas:
    APIResponseBase:
      type: object
      description: Standard response envelope returned by all HTTP endpoints
      required:
        - success
        - message
        - data
        - errors
        - meta
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true
        errors:
          type: array
          items:
            type: string
          nullable: true
        meta:
          nullable: true

    Error:
      description: Standard error response
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: false
            message:
              type: string
              example: "Validation failed"
            data:
              nullable: true
              example: null
            errors:
              type: array
              items:
                type: string
              example:
                - "email is required"
            meta:
              nullable: true
              example: null

    Pagination:
      type: object
      description: Pagination metadata for list endpoints
      properties:
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 10
        total_items:
          type: integer
          example: 125
        total_pages:
          type: integer
          example: 13
        has_next:
          type: boolean
          example: true
        has_previous:
          type: boolean
          example: false

    Meta:
      type: object
      description: Optional metadata container
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'

    EmptySuccessResponse:
      description: Success response without a data payload
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "Operation completed successfully"
            data:
              nullable: true
              example: null
            errors:
              nullable: true
              example: null
            meta:
              nullable: true
              example: null

    # ========================================
    # USER SCHEMAS
    # ========================================
    User:
      description: User profile payload
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "student@university.edu"
        budgeting_style:
          type: string
          enum: [strict, flexible, none]
          example: "flexible"
        default_currency:
          type: string
          example: "ETB"
        created_at:
          type: string
          format: date-time
          example: "2024-01-01T10:30:00Z"

    UpdateUserInput:
      type: object
      properties:
        name:
          type: string
          example: "John Updated"
        budgeting_style:
          type: string
          enum: [strict, flexible, none]
          example: "strict"
        default_currency:
          type: string
          example: "USD"
      minProperties: 1
      description: All fields are optional - send only what you want to update

    # ========================================
    # AUTH SCHEMAS
    # ========================================
    RegisterInput:
      type: object
      description: Registration payload
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "student@university.edu"
        password:
          type: string
          format: password
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).+$'
          example: "Secure123!"
          description: Must be at least 8 characters and include one uppercase letter, one lowercase letter, one number, and one special character

    LoginInput:
      type: object
      description: Login payload
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "student@university.edu"
        password:
          type: string
          format: password
          example: "Secure123!"

    RefreshInput:
      type: object
      description: Refresh or logout request payload
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh.signature"

    AuthResponse:
      type: object
      description: Token pair plus the authenticated user
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access.signature"
        refresh_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh.signature"
        user:
          $ref: '#/components/schemas/User'

    UserSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "User fetched successfully"
            data:
              $ref: '#/components/schemas/User'
            errors:
              nullable: true
              example: null
            meta:
              nullable: true
              example: null

    AuthSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "User logged in successfully"
            data:
              $ref: '#/components/schemas/AuthResponse'
            errors:
              nullable: true
              example: null
            meta:
              nullable: true
              example: null

    # ========================================
    # EXPENSE SCHEMAS (Team 2)
    # ========================================
    Expense:
      description: Expense resource
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        category_id:
          type: string
          format: uuid
          nullable: true
        is_recurring:
          type: boolean
        recurrence_type:
          type: string
          enum: [daily, weekly, monthly]
        next_due_date:
          type: string
          format: date
          nullable: true
        reminder_enabled:
          type: boolean
        reminder_sent_at:
          type: string
          format: date-time
          nullable: true
        note:
          type: string
        expense_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    CreateExpenseRequest:
      type: object
      description: Expense creation payload
      required:
        - amount
        - expense_date
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0
        category_id:
          type: string
          format: uuid
          nullable: true
        is_recurring:
          type: boolean
          default: false
        recurrence_type:
          type: string
          enum: [daily, weekly, monthly]
        next_due_date:
          type: string
          format: date
        reminder_enabled:
          type: boolean
        note:
          type: string
        expense_date:
          type: string
          format: date

    UpdateExpenseRequest:
      type: object
      description: Expense update payload
      properties:
        amount:
          type: number
          format: double
          minimum: 0
        category_id:
          type: string
          format: uuid
          nullable: true
        is_recurring:
          type: boolean
        recurrence_type:
          type: string
          enum: [daily, weekly, monthly]
        next_due_date:
          type: string
          format: date
        reminder_enabled:
          type: boolean
        note:
          type: string
        expense_date:
          type: string
          format: date

    ExpenseListData:
      type: object
      description: Paginated expense items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Expense'

    ExpenseSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "Expense retrieved successfully"
            data:
              $ref: '#/components/schemas/Expense'
            errors:
              nullable: true
              example: null
            meta:
              nullable: true
              example: null

    ExpenseListResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "Expenses retrieved successfully"
            data:
              $ref: '#/components/schemas/ExpenseListData'
            errors:
              nullable: true
              example: null
            meta:
              $ref: '#/components/schemas/Meta'

    # ========================================
    # CATEGORY SCHEMAS (Team 2)
    # ========================================
    Category:
      description: Category resource
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        user_id:
          type: string
          format: uuid
          nullable: true

    CreateCategoryRequest:
      type: object
      description: Category creation payload
      required:
        - name
      properties:
        name:
          type: string
        user_id:
          type: string
          format: uuid
          nullable: true

    UpdateCategoryRequest:
      type: object
      description: Category update payload
      properties:
        name:
          type: string

    CategoryListData:
      type: object
      description: Paginated category items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    CategorySuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "Category retrieved successfully"
            data:
              $ref: '#/components/schemas/Category'
            errors:
              nullable: true
              example: null
            meta:
              nullable: true
              example: null

    CategoryListResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "Categories retrieved successfully"
            data:
              $ref: '#/components/schemas/CategoryListData'
            errors:
              nullable: true
              example: null
            meta:
              $ref: '#/components/schemas/Meta'

    # ========================================
    # DEBT SCHEMAS
    # ========================================
    Debt:
      type: object
      description: Debt resource
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        user_id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        type:
          type: string
          enum: [lent, borrowed]
          example: "lent"
        peer_name:
          type: string
          example: "Alex"
        amount:
          type: number
          format: float
          example: 100.50
        due_date:
          type: string
          format: date
          example: "2024-02-01"
        status:
          type: string
          enum: [pending, paid, overdue]
          example: "pending"
        reminder_enabled:
          type: boolean
          example: true
        note:
          type: string
          nullable: true
          example: "Movie tickets"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    CreateDebtInput:
      type: object
      description: Debt creation payload
      required:
        - type
        - peer_name
        - amount
        - due_date
      properties:
        type:
          type: string
          enum: [lent, borrowed]
          example: "lent"
        peer_name:
          type: string
          example: "Alex"
        amount:
          type: number
          format: float
          minimum: 0.01
          example: 100.50
        due_date:
          type: string
          format: date
          example: "2024-02-01"
        reminder_enabled:
          type: boolean
          default: false
          example: true
        note:
          type: string
          example: "Movie tickets"

    UpdateDebtInput:
      type: object
      description: Debt update payload
      properties:
        type:
          type: string
          enum: [lent, borrowed]
          example: "borrowed"
        peer_name:
          type: string
          example: "Sarah"
        amount:
          type: number
          format: float
          minimum: 0.01
          example: 150.00
        due_date:
          type: string
          format: date
          example: "2024-03-01"
        reminder_enabled:
          type: boolean
          example: false
        note:
          type: string
          example: "Updated note"
      minProperties: 1

    DebtListData:
      type: object
      description: Paginated debt items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Debt'

    DebtSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "Debt retrieved successfully"
            data:
              $ref: '#/components/schemas/Debt'
            errors:
              nullable: true
              example: null
            meta:
              nullable: true
              example: null

    DebtListResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "Debts retrieved successfully"
            data:
              $ref: '#/components/schemas/DebtListData'
            errors:
              nullable: true
              example: null
            meta:
              $ref: '#/components/schemas/Meta'

    # ========================================
    # REPORT SCHEMAS
    # ========================================
    WeeklyReport:
      type: object
      description: Weekly report payload
      properties:
        start_date:
          type: string
          format: date
          example: "2024-01-01"
        end_date:
          type: string
          format: date
          example: "2024-01-07"
        total_expense:
          type: number
          format: float
          example: 250.75
        total_lent:
          type: number
          format: float
          example: 50.00
        total_borrowed:
          type: number
          format: float
          example: 0
        category_breakdown:
          type: array
          items:
            type: object
            properties:
              category_name:
                type: string
                example: "Food"
              total:
                type: number
                format: float
                example: 120.50

    DailyReport:
      type: object
      description: Daily report payload. Field names use hyphenated keys to match the current API response.
      properties:
        date:
          type: string
          format: date
          example: "2024-01-01"
        total-expense:
          type: number
          format: float
          example: 120.50
        total-lent:
          type: number
          format: float
          example: 50
        total-borrowed:
          type: number
          format: float
          example: 25

    MonthlyReport:
      type: object
      description: Monthly report payload
      properties:
        month:
          type: string
          example: "2024-01"
        total_expense:
          type: number
          format: float
          example: 250.75
        total_lent:
          type: number
          format: float
          example: 50
        total_borrowed:
          type: number
          format: float
          example: 0
        category_breakdown:
          type: array
          items:
            type: object
            properties:
              category_name:
                type: string
                example: "Food"
              total:
                type: number
                format: float
                example: 120.50

    WeeklyReportSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "Weekly report retrieved successfully"
            data:
              $ref: '#/components/schemas/WeeklyReport'
            errors:
              nullable: true
              example: null
            meta:
              nullable: true
              example: null

    DailyReportSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "Daily report retrieved successfully"
            data:
              $ref: '#/components/schemas/DailyReport'
            errors:
              nullable: true
              example: null
            meta:
              nullable: true
              example: null

    MonthlyReportSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: true
            message:
              type: string
              example: "Monthly report retrieved successfully"
            data:
              $ref: '#/components/schemas/MonthlyReport'
            errors:
              nullable: true
              example: null
            meta:
              nullable: true
              example: null
